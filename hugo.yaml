baseURL: https://budget-gaming-lab.pages.dev
languageCode: en-us
title: "Budget Gaming Lab"
theme: PaperMod

paginate: 10

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

googleAnalytics: ""

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "Budget Gaming Lab"
  description: "Best budget gaming gear reviews, guides, and deals. We help you build the best gaming setup without breaking the bank."
  keywords: [Budget Gaming, Gaming Gear, Cheap Gaming PC, Gaming Mouse, Gaming Keyboard]
  author: "Budget Gaming Lab"
  images: ["images/og.png"]
  DateFormat: "January 2, 2006"
  defaultTheme: auto
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: true

  assets:
    disableHLJS: true
    disableFingerprinting: true

  label:
    text: "Budget Gaming Lab"
    icon: ""
    iconHeight: 35

  profileMode:
    enabled: false

  homeInfoParams:
    Title: "Best Budget Gaming Gear"
    Content: >
      Welcome to **Budget Gaming Lab**. We review and recommend the best budget-friendly gaming
      peripherals, PCs, monitors, and accessories. Whether you are building your first gaming rig
      or upgrading on a budget, we have you covered.

  socialIcons:
    - name: email
      url: "mailto:hello@budgetgaminglab.com"

taxonomies:
  category: categories
  tag: tags

menu:
  main:
    - identifier: categories
      name: Categories
      url: /categories/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: about
      name: About
      url: /about/
      weight: 30

privacy:
  youtube:
    disable: false
    privacyEnhanced: true
