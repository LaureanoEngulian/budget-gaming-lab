baseURL: https://budget-gaming-lab.pages.dev
locale: es-ES
title: "Budget Gaming Lab"
defaultContentLanguage: es
theme: PaperMod

pagination:
  pagerSize: 10

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

googleAnalytics: ""

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "Budget Gaming Lab"
  description: "Análisis, guías y ofertas de los mejores equipos gaming económicos. Te ayudamos a montar el mejor setup gaming sin gastar de más."
  keywords: [Gaming Económico, Equipo Gaming, PC Gaming Barato, Ratón Gaming, Teclado Gaming]
  author: "Budget Gaming Lab"
  images: ["images/og.png"]
  DateFormat: "2 January 2006"
  defaultTheme: auto
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: true

  assets:
    disableHLJS: true
    disableFingerprinting: true

  label:
    text: "Budget Gaming Lab"
    icon: ""
    iconHeight: 35

  profileMode:
    enabled: false

  homeInfoParams:
    Title: "Los Mejores Equipos Gaming Económicos"
    Content: >
      Bienvenido a **Budget Gaming Lab**. Analizamos y recomendamos los mejores periféricos,
      PC, monitores y accesorios gaming con buena relación calidad-precio. Ya sea que estés
      montando tu primer equipo o actualizando con poco presupuesto, tenemos lo que buscas.

  socialIcons:
    - name: email
      url: "mailto:hello@budgetgaminglab.com"

taxonomies:
  category: categories
  tag: tags

menu:
  main:
    - identifier: categories
      name: Categorías
      url: /categories/
      weight: 10
    - identifier: tags
      name: Etiquetas
      url: /tags/
      weight: 20
    - identifier: about
      name: Acerca de
      url: /about/
      weight: 30

privacy:
  youtube:
    disable: false
    privacyEnhanced: true
